# obserLGCR — Telegraf SNMP → PostgreSQL/TimescaleDB
# HOST-RESOURCES-MIB + IF-MIB + hrSWInstalledTable
#
# Despliegue:
#   docker compose -f docker-compose.telegraf.yml up -d
#   o copiar a /etc/telegraf/telegraf.conf
#
# Variables (env):
#   SNMP_COMMUNITY, SNMP_TARGETS (CSV IPs), PG_HOST, PG_USER, PG_PASSWORD, PG_DATABASE
#   OBSERLGCR_API_URL — alternativa HTTP ingest

[global_tags]
  site = "${SITE:-lgcr-dc1}"
  region = "${REGION:-global}"

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "30s"
  flush_jitter = "5s"
  precision = "0s"
  hostname = "telegraf-snmp-collector"
  omit_hostname = false

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT: SNMP — disponibilidad + sysDescr (keepalive)
# ═══════════════════════════════════════════════════════════════════════════════
[[inputs.snmp]]
  agents = ["udp://${SNMP_TARGET_1:-192.168.1.1}:161"]
  version = 2
  community = "${SNMP_COMMUNITY:-public}"
  timeout = "5s"
  retries = 2
  agent_host_tag = "device_ip"

  name = "snmp.sys"
  [[inputs.snmp.field]]
    name = "sysUpTime"
    oid = "SNMPv2-MIB::sysUpTime.0"
    conversion = "float(2)"
  [[inputs.snmp.field]]
    name = "sysUpTime_centiseconds"
    oid = "DISMAN-EVENT-MIB::sysUpTimeInstance"
  [[inputs.snmp.field]]
    name = "sysDescr"
    oid = "SNMPv2-MIB::sysDescr.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sysName"
    oid = "SNMPv2-MIB::sysName.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sysLocation"
    oid = "SNMPv2-MIB::sysLocation.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "sysObjectID"
    oid = "SNMPv2-MIB::sysObjectID.0"
    is_tag = true

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT: SNMP — CPU (HOST-RESOURCES-MIB + UCD-SNMP-MIB)
# ═══════════════════════════════════════════════════════════════════════════════
[[inputs.snmp]]
  agents = ["udp://${SNMP_TARGET_1:-192.168.1.1}:161"]
  version = 2
  community = "${SNMP_COMMUNITY:-public}"
  timeout = "5s"
  agent_host_tag = "device_ip"
  name = "snmp.cpu"

  [[inputs.snmp.field]]
    name = "ssCpuUser"
    oid = "UCD-SNMP-MIB::ssCpuUser.0"
  [[inputs.snmp.field]]
    name = "ssCpuSystem"
    oid = "UCD-SNMP-MIB::ssCpuSystem.0"
  [[inputs.snmp.field]]
    name = "ssCpuIdle"
    oid = "UCD-SNMP-MIB::ssCpuIdle.0"

  [[inputs.snmp.table]]
    name = "snmp.cpu.hrProcessor"
    oid = "HOST-RESOURCES-MIB::hrProcessorTable"
    inherit_tags = ["device_ip"]
    [[inputs.snmp.table.field]]
      name = "hrProcessorLoad"
      oid = "HOST-RESOURCES-MIB::hrProcessorLoad"
      is_tag = false
    [[inputs.snmp.table.field]]
      name = "hrDeviceIndex"
      oid = "HOST-RESOURCES-MIB::hrDeviceIndex"
      is_tag = true

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT: SNMP — Memoria / disco (hrStorageTable)
# ═══════════════════════════════════════════════════════════════════════════════
[[inputs.snmp]]
  agents = ["udp://${SNMP_TARGET_1:-192.168.1.1}:161"]
  version = 2
  community = "${SNMP_COMMUNITY:-public}"
  timeout = "8s"
  agent_host_tag = "device_ip"
  name = "snmp.storage"

  [[inputs.snmp.table]]
    name = "snmp.memory.hrStorage"
    oid = "HOST-RESOURCES-MIB::hrStorageTable"
    inherit_tags = ["device_ip"]
    [[inputs.snmp.table.field]]
      name = "hrStorageIndex"
      oid = "HOST-RESOURCES-MIB::hrStorageIndex"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "hrStorageDescr"
      oid = "HOST-RESOURCES-MIB::hrStorageDescr"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "hrStorageAllocationUnits"
      oid = "HOST-RESOURCES-MIB::hrStorageAllocationUnits"
    [[inputs.snmp.table.field]]
      name = "hrStorageSize"
      oid = "HOST-RESOURCES-MIB::hrStorageSize"
    [[inputs.snmp.table.field]]
      name = "hrStorageUsed"
      oid = "HOST-RESOURCES-MIB::hrStorageUsed"
    [[inputs.snmp.table.field]]
      name = "hrStorageType"
      oid = "HOST-RESOURCES-MIB::hrStorageType"
      is_tag = true

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT: SNMP — Interfaces (IF-MIB / ifXTable)
# ═══════════════════════════════════════════════════════════════════════════════
[[inputs.snmp]]
  agents = ["udp://${SNMP_TARGET_1:-192.168.1.1}:161"]
  version = 2
  community = "${SNMP_COMMUNITY:-public}"
  timeout = "10s"
  agent_host_tag = "device_ip"
  name = "snmp.interface"

  [[inputs.snmp.table]]
    name = "snmp.if"
    oid = "IF-MIB::ifXTable"
    inherit_tags = ["device_ip"]
    [[inputs.snmp.table.field]]
      name = "ifName"
      oid = "IF-MIB::ifName"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "IF-MIB::ifDescr"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid = "IF-MIB::ifIndex"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "IF-MIB::ifHCInOctets"
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "IF-MIB::ifHCOutOctets"
    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = "IF-MIB::ifInErrors"
    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = "IF-MIB::ifOutErrors"
    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid = "IF-MIB::ifInDiscards"
    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid = "IF-MIB::ifOutDiscards"
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "IF-MIB::ifOperStatus"
    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = "IF-MIB::ifAdminStatus"
    [[inputs.snmp.table.field]]
      name = "ifHighSpeed"
      oid = "IF-MIB::ifHighSpeed"

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT: SNMP — Software instalado (hrSWInstalledTable)
# OID base: 1.3.6.1.2.1.25.6.3.1 (HOST-RESOURCES-MIB)
# ═══════════════════════════════════════════════════════════════════════════════
[[inputs.snmp]]
  agents = ["udp://${SNMP_TARGET_1:-192.168.1.1}:161"]
  version = 2
  community = "${SNMP_COMMUNITY:-public}"
  timeout = "15s"
  agent_host_tag = "device_ip"
  name = "snmp.software"
  interval = "300s"

  [[inputs.snmp.table]]
    name = "snmp.swInstalled"
    oid = "HOST-RESOURCES-MIB::hrSWInstalledTable"
    inherit_tags = ["device_ip"]
    [[inputs.snmp.table.field]]
      name = "hrSWInstalledIndex"
      oid = "HOST-RESOURCES-MIB::hrSWInstalledIndex"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "hrSWInstalledName"
      oid = "HOST-RESOURCES-MIB::hrSWInstalledName"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "hrSWInstalledDate"
      oid = "HOST-RESOURCES-MIB::hrSWInstalledDate"
    [[inputs.snmp.table.field]]
      name = "hrSWInstalledPath"
      oid = "HOST-RESOURCES-MIB::hrSWInstalledPath"
      is_tag = true

# ═══════════════════════════════════════════════════════════════════════════════
# PROCESSOR: derivar usage_pct en storage + renombrar tags
# ═══════════════════════════════════════════════════════════════════════════════
[[processors.starlark]]
  namepass = ["snmp.memory.hrStorage"]
  source = '''
def apply(metric):
    used = metric.fields.get("hrStorageUsed")
    size = metric.fields.get("hrStorageSize")
    if used != None and size != None and size > 0:
        metric.fields["usage_pct"] = float(used) / float(size) * 100.0
    descr = metric.tags.get("hrStorageDescr", "")
    if "memory" in descr.lower() or "ram" in descr.lower():
        metric.name = "snmp.memory"
    return metric
'''

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT A: HTTP → obserLGCR API (recomendado — mapeo a hypertables)
# ═══════════════════════════════════════════════════════════════════════════════
[[outputs.http]]
  url = "${OBSERLGCR_API_URL:-http://localhost:8787}/api/noc/snmp/ingest"
  method = "POST"
  data_format = "json"
  timeout = "15s"
  [outputs.http.headers]
    Content-Type = "application/json"
    Authorization = "Bearer ${NOC_AGENT_TOKEN}"

  namepass = [
    "snmp.sys",
    "snmp.cpu",
    "snmp.cpu.hrProcessor",
    "snmp.memory",
    "snmp.memory.hrStorage",
    "snmp.if",
    "snmp.swInstalled",
  ]

