<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Confirmar cierre de ticket</title>
<style>
  :root { --bg:#0b1220; --card:#111a2e; --bd:#243049; --fg:#e6edf6; --mut:#8aa0bd;
          --ok:#16a34a; --okbg:#0f2a1c; --warn:#d97706; --bad:#dc2626; --cyan:#22d3ee; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:var(--bg); color:var(--fg); font:15px/1.55 system-ui,Segoe UI,Roboto,sans-serif; padding:24px; }
  .card { width:100%; max-width:480px; background:var(--card); border:1px solid var(--bd);
          border-radius:14px; padding:28px; box-shadow:0 10px 40px rgba(0,0,0,.45); }
  h1 { font-size:18px; margin:0 0 4px; }
  .ref { font-family:ui-monospace,Menlo,monospace; color:var(--cyan); font-size:13px; }
  .subject { color:var(--mut); margin:10px 0 18px; }
  .status { display:inline-block; font-size:12px; padding:2px 10px; border:1px solid var(--bd); border-radius:999px; color:var(--mut); }
  .actions { display:flex; flex-direction:column; gap:10px; margin-top:22px; }
  button { font:inherit; font-weight:600; border:0; border-radius:10px; padding:12px 16px; cursor:pointer; }
  .btn-ok { background:var(--ok); color:#fff; }
  .btn-ghost { background:transparent; color:var(--mut); border:1px solid var(--bd); }
  .btn-ok:disabled,.btn-ghost:disabled { opacity:.5; cursor:not-allowed; }
  textarea { width:100%; margin-top:10px; background:#0b1424; color:var(--fg); border:1px solid var(--bd);
             border-radius:10px; padding:10px; font:inherit; resize:vertical; min-height:72px; }
  .msg { margin-top:18px; padding:14px; border-radius:10px; font-size:14px; }
  .msg.ok  { background:var(--okbg); border:1px solid #1d4d33; }
  .msg.err { background:#2a1414; border:1px solid #5b2020; color:#fca5a5; }
  .mut { color:var(--mut); }
  .hidden { display:none; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4);
          border-top-color:#fff; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; }
  @keyframes s { to { transform:rotate(360deg); } }
  footer { margin-top:22px; text-align:center; font-size:11px; color:var(--mut); }
</style>
</head>
<body>
<div class="card">
  <div id="loading" class="mut">Cargando…</div>

  <div id="view" class="hidden">
    <h1>Confirmar cierre del ticket</h1>
    <div class="ref" id="ref"></div>
    <div class="subject" id="subject"></div>
    <span class="status" id="status"></span>

    <div id="actions" class="actions">
      <p class="mut" style="margin:18px 0 0">Nuestro equipo considera resuelto este ticket. ¿Confirmás que podemos cerrarlo?</p>
      <button class="btn-ok" id="btnConfirm">Sí, confirmo el cierre</button>
      <button class="btn-ghost" id="btnReject">Todavía no está resuelto</button>
      <div id="rejectBox" class="hidden">
        <textarea id="reason" placeholder="Contanos brevemente qué falta resolver (opcional)…"></textarea>
        <button class="btn-ghost" id="btnRejectSend" style="margin-top:10px;width:100%">Enviar y reabrir</button>
      </div>
    </div>
  </div>

  <div id="result" class="hidden"></div>
  <footer>LegacyHunt · Soporte SOC</footer>
</div>

<script>
(function () {
  var ct = new URLSearchParams(location.search).get("ct") || "";
  var $ = function (id) { return document.getElementById(id); };
  function show(el) { el.classList.remove("hidden"); }
  function hide(el) { el.classList.add("hidden"); }

  function result(kind, html) {
    hide($("view")); hide($("loading"));
    var r = $("result");
    r.className = "msg " + kind; r.innerHTML = html; show(r);
  }
  function fail(text) { result("err", text); }

  if (!ct) { fail("Enlace inválido: falta el token."); return; }

  fetch("/api/portal/closure?ct=" + encodeURIComponent(ct))
    .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (res) {
      if (!res.ok || !res.j.ok) { fail((res.j && res.j.error) || "Enlace no encontrado."); return; }
      var d = res.j;
      hide($("loading")); show($("view"));
      $("ref").textContent = d.ref;
      $("subject").textContent = d.subject || "";
      $("status").textContent = "Estado: " + d.ticketStatus;
      if (d.expired) { fail("Este enlace expiró. Pedí uno nuevo a tu equipo de soporte."); return; }
      if (d.decided) {
        result("ok", d.decision === "CONFIRMADO"
          ? "Este cierre ya fue <b>confirmado</b>. ¡Gracias!"
          : "Ya indicaste que <b>aún no estaba resuelto</b>. Tu equipo lo está retomando.");
      }
    })
    .catch(function () { fail("No pudimos cargar el ticket. Intentá de nuevo más tarde."); });

  function decide(decision, reason, btn) {
    var orig = btn.innerHTML;
    Array.prototype.forEach.call(document.querySelectorAll("button"), function (b) { b.disabled = true; });
    btn.innerHTML = '<span class="spin"></span> Enviando…';
    fetch("/api/portal/closure/decide", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ct: ct, decision: decision, reason: reason || "" }),
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j.ok) { fail((res.j && res.j.error) || "No se pudo registrar tu respuesta."); return; }
        result("ok", decision === "CONFIRMADO"
          ? "✓ <b>Cierre confirmado</b>. Gracias por avisarnos — el ticket quedó cerrado."
          : "Gracias. Avisamos a tu equipo de soporte que el incidente <b>aún no está resuelto</b> y lo van a retomar.");
      })
      .catch(function () {
        btn.innerHTML = orig;
        Array.prototype.forEach.call(document.querySelectorAll("button"), function (b) { b.disabled = false; });
        fail("Error de red. Intentá de nuevo.");
      });
  }

  $("btnConfirm").addEventListener("click", function () { decide("CONFIRMADO", "", this); });
  $("btnReject").addEventListener("click", function () { show($("rejectBox")); this.disabled = true; });
  $("btnRejectSend").addEventListener("click", function () { decide("RECHAZADO", $("reason").value, this); });
})();
</script>
</body>
</html>
