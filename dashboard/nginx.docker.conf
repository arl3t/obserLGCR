# nginx.docker.conf — Configuración para el contenedor Docker (HTTP interno).
# NO es la config de producción con TLS: para eso ver nginx.conf.example.
# Nginx sirve los estáticos Vite (dist/) y proxea /api → legacyhunt-api:8787.
# El TLS lo termina el proxy externo o el router de red del lab (OPNsense, Caddy, etc.).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs estructurados
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-javascript image/svg+xml;

    # ── Upstream: legacyhunt-api (nombre DNS interno de Docker Compose) ──────
    upstream legacyhunt_api {
        server api:8787;
        keepalive 16;   # conexiones keep-alive al API (reduce overhead TCP)
    }

    upstream obserlgcr_ipam {
        server ipam:8000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Timeouts alineados con el cliente Axios (60 s)
        proxy_read_timeout    65s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    65s;

        # Cabeceras comunes para todos los bloques proxy
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # ── Socket.io (WebSocket + long-polling) — más específico que /api/ ─
        location /api/socket.io/ {
            proxy_pass http://legacyhunt_api;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;  # WS persistente: sin timeout de idle
        }

        # ── IPAM (FastAPI) — inventario RFC 1918 ─────────────────────────────
        location ~ ^/api/v1/ipam/subnets/[0-9]+/discover$ {
            proxy_pass http://obserlgcr_ipam;
            proxy_redirect off;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 600s;
        }

        location /api/v1/ipam/ {
            proxy_pass http://obserlgcr_ipam/api/v1/ipam/;
            proxy_redirect off;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 120s;
        }

        # ── REST API — proxy transparente ────────────────────────────────────
        # Descubrimiento SNMP: /24 puede tardar 2–5 min
        location /api/noc/snmp/discover {
            proxy_pass http://legacyhunt_api;
            proxy_set_header Connection "";
            proxy_read_timeout    600s;
            proxy_connect_timeout 15s;
            proxy_send_timeout    600s;
            client_max_body_size 4m;
            proxy_buffering off;
        }

        location /api/ {
            proxy_pass http://legacyhunt_api;
            proxy_set_header Connection "";   # keep-alive al upstream

            # Subidas de archivos (leak-intel, shadowserver, pcap)
            client_max_body_size 512m;

            # Buffer desactivado para SSE / chunked responses de Trino
            proxy_buffering off;

            # En caso de error de upstream: JSON en lugar de la página de error de nginx
            proxy_intercept_errors off;
        }

        # ── Service worker y manifests PWA — NUNCA cachear ────────────────────
        # Si sw.js queda cacheado con immutable/1y, el navegador no descarga el
        # nuevo SW tras un rebuild y los usuarios siguen viendo bundles viejos
        # del precache (issue #PWA-stale-sw). Estos archivos deben revalidarse
        # en cada navegación para que `skipWaiting`+`clientsClaim` funcionen.
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma no-cache;
            expires 0;
            access_log off;
        }
        location = /registerSW.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
            access_log off;
        }
        location = /manifest.webmanifest {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
            access_log off;
        }
        location ~ ^/workbox-[A-Za-z0-9-]+\.js$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
            access_log off;
        }

        # ── Estáticos con cache agresivo (content hash en nombre de fichero) ─
        location ~* \.(js|css|woff2|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # ── index.html — nunca cachear (el navegador siempre pide la versión nueva)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma no-cache;
            expires 0;
        }

        # ── Mockups HTML estáticos (fuera del router React) ───────────────────
        location /mockups/ {
            try_files $uri $uri.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # ── SPA fallback — cualquier ruta desconocida → index.html ───────────
        # DEBE ir al final para no interceptar /api/
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # ── Health-check interno (Docker Compose healthcheck) ─────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
