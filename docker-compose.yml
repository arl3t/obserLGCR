# obserLGCR — fork demo de LegacyHunt (solo Postgres, SIN autenticación).
# Stack mínimo: postgres + api + dashboard. Sin Trino/MinIO/Keycloak/Airflow.
#
#   docker compose up -d --build
#   → Dashboard:  http://localhost:8080
#   → API:        http://localhost:8787/api/health
#
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: obserlgcr-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_USER: ${PG_USER:-obserlgcr}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-obserlgcr}
      POSTGRES_DB: ${PG_DATABASE:-obserlgcr}
    volumes:
      - obserlgcr-pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5433}:5432"
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-obserlgcr} -d ${PG_DATABASE:-obserlgcr}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  api:
    build:
      context: ./api
    image: obserlgcr-api:local
    container_name: obserlgcr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipam:
        condition: service_started
    environment:
      # ── Sin autenticación (modo lab) ──────────────────────────────────────
      OIDC_ENABLED: "false"
      # ── Postgres ──────────────────────────────────────────────────────────
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-obserlgcr}
      PG_PASSWORD: ${PG_PASSWORD:-obserlgcr}
      PG_DATABASE: ${PG_DATABASE:-obserlgcr}
      PORT: "8787"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Sin data-lake: TRINO_URL vacío → las consultas de detección en vivo
      # devuelven 0 filas (stub). Ver README → "Conectar datos reales".
      TRINO_URL: ""
      NOC_AGENT_TOKEN: ${NOC_AGENT_TOKEN:-}
      PLATFORM_AUTH_ENABLED: ${PLATFORM_AUTH_ENABLED:-true}
      AGENT_JWT_SECRET: ${AGENT_JWT_SECRET:-change-me-agent-jwt-secret}
      NOC_WATCHER_INTERVAL_MS: ${NOC_WATCHER_INTERVAL_MS:-30000}
      GOVERNANCE_INCIDENT_WORKER: ${GOVERNANCE_INCIDENT_WORKER:-true}
      GOVERNANCE_INCIDENT_INTERVAL_MS: ${GOVERNANCE_INCIDENT_INTERVAL_MS:-15000}
      NOC_LAKE_ROOT: ${NOC_LAKE_ROOT:-/app/data/lake/noc}
      NOC_DEFAULT_REGION: ${NOC_DEFAULT_REGION:-global}
      CRON_SECRET: ${CRON_SECRET:-}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:8080}
      SOCKETIO_CORS_ORIGINS: ${SOCKETIO_CORS_ORIGINS:-}
      IPAM_HOST: ipam
      IPAM_PORT: "8000"
    ports:
      - "${API_PORT:-8787}:8787"
    volumes:
      - obserlgcr-lake:/app/data/lake

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_BASE_URL: ""
        VITE_OIDC_AUTHORITY: ""
        VITE_TENANT_NAME: "obserLGCR"
        VITE_PLATFORM_AUTH: "true"
    image: obserlgcr-dashboard:local
    container_name: obserlgcr-dashboard
    restart: unless-stopped
    depends_on:
      - api
      - ipam
    ports:
      - "${DASHBOARD_PORT:-8080}:80"

  ipam:
    build:
      context: ./ipam
    image: obserlgcr-ipam:local
    container_name: obserlgcr-ipam
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nmap-runner:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${PG_USER:-obserlgcr}:${PG_PASSWORD:-obserlgcr}@postgres:5432/${PG_DATABASE:-obserlgcr}
      AGENT_JWT_SECRET: ${AGENT_JWT_SECRET:-change-me-agent-jwt-secret}
      PLATFORM_AUTH_ENABLED: ${PLATFORM_AUTH_ENABLED:-true}
      NMAP_TIMEOUT_SEC: ${NMAP_TIMEOUT_SEC:-600}
      NMAP_HOST_TIMEOUT_SEC: ${NMAP_HOST_TIMEOUT_SEC:-5}
      # nmap en LAN 192.168.x.x: ejecutar en el host → python3 scripts/nmap-host-runner.py
      NMAP_RUNNER_URL: ${NMAP_RUNNER_URL:-http://host.docker.internal:8791}
      NMAP_RUNNER_TOKEN: ${NMAP_RUNNER_TOKEN:-change-me-nmap-runner}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${IPAM_PORT:-8790}:8000"

  # nmap en la red del host (LAN 192.168.x.x). IPAM se conecta vía host.docker.internal:8791.
  nmap-runner:
    build:
      context: .
      dockerfile: scripts/Dockerfile.nmap-runner
    image: obserlgcr-nmap-runner:local
    container_name: obserlgcr-nmap-runner
    restart: unless-stopped
    network_mode: host
    environment:
      NMAP_RUNNER_PORT: ${NMAP_RUNNER_PORT:-8791}
      NMAP_RUNNER_BIND: 0.0.0.0
      NMAP_RUNNER_TOKEN: ${NMAP_RUNNER_TOKEN:-change-me-nmap-runner}
      NMAP_TIMEOUT_SEC: ${NMAP_TIMEOUT_SEC:-600}
      NMAP_HOST_TIMEOUT_SEC: ${NMAP_HOST_TIMEOUT_SEC:-5}

volumes:
  obserlgcr-pgdata:
  obserlgcr-lake:
